<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ZeeVeez Gummy Snacks — All-natural, plant-based gummy snacks. White Honey Apple. Made in Texas by ZV3, LLC." />
  <title>ZeeVeez™ | Coming Soon</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green-100: #dcfce7;
      --green-200: #bbf7d0;
      --green-400: #4ade80;
      --green-500: #22c55e;
      --green-600: #16a34a;
      --green-700: #15803d;
      --text-dark: #0f1f15;
      --text-mid:  #2d5a3d;
      --text-light:#5a7d6a;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(165deg, #f0fdf4 0%, #dcfce7 40%, #d4f7e0 70%, #fef9c3 100%);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 10;
      max-width: 600px; width: 100%;
      margin: 60px 24px;
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
      gap: 20px;
    }

    /* ── Wordmark / logo ── */
    .wordmark { display:flex; flex-direction:column; align-items:center; gap:6px; }
    .logo-img  { height:64px; width:auto; filter:drop-shadow(0 3px 10px rgba(0,0,0,0.1)); }
    .wordmark__tag  { font-size:13px; font-weight:700; color:var(--text-light); letter-spacing:.5px; }

    /* ── Heading ── */
    .heading { font-size:52px; font-weight:800; letter-spacing:-1.5px; line-height:1.08; color:var(--text-dark); }

    /* ── Bag wrapper — orbit arms live inside here ── */
    .bag-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 320px;
      height: 320px;
    }

    @keyframes floatBag {
      0%,100% { transform:translateY(0) rotate(-1deg); }
      50%     { transform:translateY(-18px) rotate(1deg); }
    }

    .bag {
      position: relative;
      z-index: 2;
      width: 270px; max-width: 72vw;
      filter: drop-shadow(0 24px 48px rgba(34,197,94,0.22)) drop-shadow(0 8px 20px rgba(0,0,0,0.1));
      animation: floatBag 5.5s ease-in-out infinite;
    }

    /* ── Orbit arms — mobile only ── */
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .orbit-arm {
      display: none; /* hidden on desktop — cursor trail used instead */
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      z-index: 1;
    }
    .orbit-arm--1 { animation: spin 6s linear infinite; }
    .orbit-arm--2 { animation: spin 6s linear infinite; animation-delay: -1s;   }
    .orbit-arm--3 { animation: spin 6s linear infinite; animation-delay: -2s;   }
    .orbit-arm--4 { animation: spin 6s linear infinite; animation-delay: -3s;   }
    .orbit-arm--5 { animation: spin 6s linear infinite; animation-delay: -4s;   }
    .orbit-arm--6 { animation: spin 6s linear infinite; animation-delay: -5s;   }

    .orbit-gummy {
      position: absolute;
      width: 56px;
      height: 56px;
      object-fit: contain;
      pointer-events: none;
      /* center sits ~195px from arm pivot — well outside 135px bag edge */
      left: 167px;
      top: -28px;
    }

    @media (max-width: 768px) {
      .orbit-arm { display: block; }
      .bg-gummy  { display: none; }
      .card { gap: 14px; margin: 40px 20px; }
      .heading { font-size:40px; }
      .subcopy { font-size:15px; }
      .bag-wrap { width:260px; height:260px; }
      .orbit-gummy { width:44px; height:44px; left:116px; top:-22px; }
      .bag { max-width:64vw; }
    }

    /* ── Desktop cursor gummies (injected by JS, pointer:fine only) ── */
    .cursor-gummy {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      left: 0; top: 0;
      will-change: transform;
    }

    /* ── Sub-copy ── */
    .subcopy { font-size:17px; color:var(--text-mid); line-height:1.65; max-width:420px; }

    /* ── Email form ── */
    .form { display:flex; gap:10px; width:100%; flex-wrap:wrap; justify-content:center; }
    .form__input {
      flex:1; min-width:200px;
      padding:14px 20px; border-radius:100px;
      border:2px solid var(--green-200);
      font-size:15px; font-family:inherit;
      background:rgba(255,255,255,0.85); backdrop-filter:blur(8px);
      outline:none; color:var(--text-dark);
      transition:border-color .2s,box-shadow .2s;
    }
    .form__input::placeholder { color:var(--text-light); }
    .form__input:focus { border-color:var(--green-500); box-shadow:0 0 0 4px rgba(34,197,94,0.12); }
    .form__input:disabled { opacity:.6; cursor:not-allowed; }

    .btn {
      display:inline-flex; align-items:center;
      padding:14px 28px; border-radius:100px;
      font-size:15px; font-weight:700; font-family:inherit;
      border:none; cursor:pointer; white-space:nowrap;
      transition:transform .25s cubic-bezier(0.34,1.56,0.64,1),box-shadow .25s,background .25s;
    }
    .btn:hover  { transform:translateY(-2px); }
    .btn:active { transform:translateY(0); }
    .btn--primary { background:var(--green-500); color:#fff; box-shadow:0 4px 14px rgba(34,197,94,0.3); }
    .btn--primary:hover { background:var(--green-600); box-shadow:0 6px 24px rgba(34,197,94,0.4); }
    .btn--primary:disabled { opacity:.7; cursor:not-allowed; transform:none; }

    /* ── Success ── */
    .success {
      display:none; align-items:center; gap:8px;
      font-size:15px; font-weight:700; color:var(--green-700);
      background:rgba(255,255,255,0.7); padding:14px 24px;
      border-radius:100px; border:2px solid var(--green-200);
    }
    .success.visible { display:inline-flex; }

    /* ── Trust badges ── */
    .badges { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    .badge {
      display:inline-flex; align-items:center; gap:6px;
      font-size:13px; font-weight:600; color:var(--green-700);
      background:rgba(255,255,255,0.65); padding:6px 14px;
      border-radius:100px; border:1.5px solid var(--green-100);
      backdrop-filter:blur(4px);
    }

    .footer { font-size:12px; color:var(--text-light); font-weight:600; }

    /* ── Background scattered gummies (always visible, both desktop + mobile) ── */
    @keyframes floatG {
      0%,100% { transform: translateY(0) rotate(var(--r0)); }
      40%     { transform: translateY(-16px) rotate(var(--r1)); }
      70%     { transform: translateY(-7px)  rotate(var(--r2)); }
    }

    .bg-gummy {
      position: fixed;
      pointer-events: none;
      z-index: 1; /* behind card (z-index:10) */
      object-fit: contain;
      animation: floatG var(--dur, 7s) ease-in-out infinite var(--delay, 0s);
    }

    /* positions: spread around all four viewport edges */
    .bg-gummy--1  { width:80px;  top:6%;   left:3%;   --dur:7.2s; --delay:-1.0s; --r0:-14deg; --r1:0deg;  --r2:-6deg; }
    .bg-gummy--2  { width:56px;  top:18%;  right:4%;  --dur:6.0s; --delay:-3.5s; --r0:20deg;  --r1:28deg; --r2:14deg; }
    .bg-gummy--3  { width:70px;  top:38%;  left:2%;   --dur:8.5s; --delay:-0.5s; --r0:8deg;   --r1:18deg; --r2:4deg;  }
    .bg-gummy--4  { width:50px;  top:55%;  right:3%;  --dur:5.8s; --delay:-4.2s; --r0:-28deg; --r1:-18deg;--r2:-22deg;}
    .bg-gummy--5  { width:74px;  top:72%;  left:4%;   --dur:7.6s; --delay:-2.0s; --r0:15deg;  --r1:26deg; --r2:10deg; }
    .bg-gummy--6  { width:60px;  top:84%;  right:5%;  --dur:9.0s; --delay:-5.5s; --r0:-10deg; --r1:2deg;  --r2:-5deg; }
    .bg-gummy--7  { width:46px;  top:8%;   right:22%; --dur:6.4s; --delay:-1.8s; --r0:35deg;  --r1:48deg; --r2:28deg; }
    .bg-gummy--8  { width:62px;  top:90%;  left:22%;  --dur:8.0s; --delay:-3.0s; --r0:-5deg;  --r1:8deg;  --r2:0deg;  }
    .bg-gummy--9  { width:44px;  top:48%;  right:1%;  --dur:6.8s; --delay:-6.0s; --r0:42deg;  --r1:52deg; --r2:36deg; }
    .bg-gummy--10 { width:68px;  top:28%;  left:1%;   --dur:7.4s; --delay:-0.8s; --r0:-22deg; --r1:-10deg;--r2:-16deg;}

    @media (max-width:480px) {
      .heading  { font-size:30px; letter-spacing:-0.5px; }
      .logo-img { height:52px; }
      .bag-wrap { width:210px; height:210px; }
      .orbit-gummy { width:32px; height:32px; left:88px; top:-16px; }
      .bag { max-width:56vw; }
      .badges { gap:8px; }
      .badge  { font-size:12px; padding:5px 12px; }
    }

    @media (max-width:360px) {
      .orbit-gummy { left:76px; }
    }
  </style>
</head>
<body>

  <!-- Background floating gummies — always visible on both desktop and mobile -->
  <img class="bg-gummy bg-gummy--1"  src="/assets/gummy.png"  alt="" aria-hidden="true" />
  <img class="bg-gummy bg-gummy--2"  src="/assets/gummy2.png" alt="" aria-hidden="true" />
  <img class="bg-gummy bg-gummy--3"  src="/assets/gummy.png"  alt="" aria-hidden="true" />
  <img class="bg-gummy bg-gummy--4"  src="/assets/gummy2.png" alt="" aria-hidden="true" />
  <img class="bg-gummy bg-gummy--5"  src="/assets/gummy.png"  alt="" aria-hidden="true" />
  <img class="bg-gummy bg-gummy--6"  src="/assets/gummy2.png" alt="" aria-hidden="true" />
  <img class="bg-gummy bg-gummy--7"  src="/assets/gummy.png"  alt="" aria-hidden="true" />
  <img class="bg-gummy bg-gummy--8"  src="/assets/gummy2.png" alt="" aria-hidden="true" />
  <img class="bg-gummy bg-gummy--9"  src="/assets/gummy.png"  alt="" aria-hidden="true" />
  <img class="bg-gummy bg-gummy--10" src="/assets/gummy2.png" alt="" aria-hidden="true" />

  <main class="card">

    <div class="wordmark">
      <img src="/logo.png" alt="ZeeVeez™ Gummy Snacks" class="logo-img" />
      <span class="wordmark__tag">All-Natural Gummy Snacks &nbsp;·&nbsp; Made in Texas 🤠</span>
    </div>

    <h1 class="heading">Something delicious<br>is coming.</h1>

    <div class="bag-wrap">
      <!-- Orbit arms: each arm rotates; the gummy image is offset to create orbit path -->
      <!-- Visible on mobile only via CSS @media -->
      <div class="orbit-arm orbit-arm--1"><img class="orbit-gummy" src="/assets/gummy.png"  alt="" /></div>
      <div class="orbit-arm orbit-arm--2"><img class="orbit-gummy" src="/assets/gummy2.png" alt="" /></div>
      <div class="orbit-arm orbit-arm--3"><img class="orbit-gummy" src="/assets/gummy.png"  alt="" /></div>
      <div class="orbit-arm orbit-arm--4"><img class="orbit-gummy" src="/assets/gummy2.png" alt="" /></div>
      <div class="orbit-arm orbit-arm--5"><img class="orbit-gummy" src="/assets/gummy.png"  alt="" /></div>
      <div class="orbit-arm orbit-arm--6"><img class="orbit-gummy" src="/assets/gummy2.png" alt="" /></div>
      <img class="bag" src="/assets/bag.png" alt="ZeeVeez White Honey Apple Gummy Snacks — 1oz bag" />
    </div>

    <p class="subcopy">
      We're crafting the next chapter of ZeeVeez.<br>
      White Honey Apple — one flavor says it all.
    </p>

    <form class="form" id="notifyForm" novalidate>
      <input
        class="form__input"
        id="emailInput"
        type="email"
        placeholder="your@email.com"
        autocomplete="email"
        required
      />
      <button class="btn btn--primary" type="submit" id="submitBtn">Notify Me</button>
    </form>

    <div class="success" id="successMsg">✅&nbsp; You're on the list — we'll be in touch!</div>

    <div class="badges">
      <span class="badge">🌿 Plant-Based</span>
      <span class="badge">🍯 White Honey Apple</span>
      <span class="badge">⭐ Made in Texas</span>
    </div>

    <p class="footer">© 2025 ZV3, LLC &nbsp;·&nbsp; zeeveez.com</p>

  </main>

  <script>
    /* ── Email form ── */
    const form       = document.getElementById('notifyForm');
    const input      = document.getElementById('emailInput');
    const submitBtn  = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = input.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        input.focus();
        input.style.borderColor = '#ef4444';
        setTimeout(() => (input.style.borderColor = ''), 1200);
        return;
      }

      input.disabled = true;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';

      try {
        const res = await fetch('/api/send-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        if (res.ok) {
          form.style.display = 'none';
          successMsg.classList.add('visible');
        } else {
          throw new Error('non-ok');
        }
      } catch {
        input.disabled = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Notify Me';
        input.style.borderColor = '#ef4444';
        setTimeout(() => (input.style.borderColor = ''), 1800);
      }
    });

    /* ── Desktop cursor-following gummy trail ── */
    /* Only activates on devices with a fine pointer (mouse / trackpad).     */
    /* On touch devices the orbit arms in CSS handle the visual instead.     */
    if (window.matchMedia('(pointer: fine)').matches) {
      const TRAIL  = 10;
      const SRCS   = ['/assets/gummy.png', '/assets/gummy2.png'];
      const SIZES  = [56, 50, 45, 40, 36, 32, 29, 26, 24, 22];
      const ALPHAS = [0.90, 0.82, 0.74, 0.66, 0.58, 0.50, 0.42, 0.34, 0.26, 0.18];
      const ROTS   = [0, 24, 48, 72, 96, 120, 144, 168, 192, 216];

      const trail = SIZES.map((size, i) => {
        const el = document.createElement('img');
        el.src = SRCS[i % 2];
        el.alt = '';
        el.className = 'cursor-gummy';
        el.style.width   = size + 'px';
        el.style.height  = size + 'px';
        el.style.opacity = ALPHAS[i];
        document.body.appendChild(el);
        return { el, x: -400, y: -400 };
      });

      let mx = -400, my = -400, running = false;

      document.addEventListener('mousemove', (e) => {
        mx = e.clientX;
        my = e.clientY;
        if (!running) { running = true; tick(); }
      });

      function tick() {
        /* Lead node chases mouse */
        trail[0].x += (mx - trail[0].x) * 0.18;
        trail[0].y += (my - trail[0].y) * 0.18;

        /* Each node chases the one ahead with slight lag */
        for (let i = 1; i < TRAIL; i++) {
          trail[i].x += (trail[i - 1].x - trail[i].x) * 0.25;
          trail[i].y += (trail[i - 1].y - trail[i].y) * 0.25;
        }

        /* Apply transforms — translate centers gummy on trail point, rotate keeps it lively */
        trail.forEach(({ el, x, y }, i) => {
          const half = SIZES[i] / 2;
          el.style.transform =
            'translate(' + (x - half) + 'px,' + (y - half) + 'px) rotate(' + ROTS[i] + 'deg)';
        });

        requestAnimationFrame(tick);
      }
    }
  </script>

</body>
</html>
